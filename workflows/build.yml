name: Auto Build Executable

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pygame pyinstaller

    - name: Build Executable with PyInstaller
      run: |
        pyinstaller --onefile --noconsole --name="QuranPageQuizApp" main.py

  
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: QuranQuizApp-Windows-Exe
        path: dist/QuranPageQuizApp.exe


    - name: Create Release and Upload Artifact
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/QuranPageQuizApp.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}